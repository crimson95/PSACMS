<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSACMS - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --gov-red: #850000; }
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 400px; width: 100%; border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .btn-primary {
            --bs-btn-bg: var(--gov-red);
            --bs-btn-border-color: var(--gov-red);
            --bs-btn-hover-bg: #660000;
            --bs-btn-hover-border-color: #660000;
            --bs-btn-active-bg: #4d0000;
            --bs-btn-active-border-color: #4d0000;
            --bs-btn-focus-shadow-rgb: 133, 0, 0;
            transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 4px 10px rgba(133, 0, 0, 0.22);
            transform: translateY(-1px);
        }
        .brand-logo { width: 60px; height: 60px; background-color: var(--gov-red); color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 0 auto 20px; }
    </style>
</head>
<body>
<div class="card login-card p-4">
    <div class="brand-logo">Gov</div>
    <h4 class="text-center mb-4">PSACMS Portal</h4>

    <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" id="emailInput" value="officer_001@example.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="passwordInput" value="secure_password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Login</button>
    </form>
</div>

<script>
    // Backend authentication endpoint used by the deployed static frontend.
    const API_BASE = 'https://psacms.onrender.com/psacms/api/auth';

    // Listen for the login form submit event.
    document.getElementById("loginForm").addEventListener('submit', function(e) {
        e.preventDefault();  // Prevent the browser from refreshing the page.

        const email = document.getElementById("emailInput").value;
        const password = document.getElementById("passwordInput").value;
        const errorAlert = document.getElementById("errorAlert");
        if (errorAlert) errorAlert.classList.add('d-none');  // Hide any previous error message.

        // Call the backend login API with Fetch.
        fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: email, password: password })
        })
        .then(async response => {
            if (response.ok) {
                const token = await response.text();

                // Store the JWT in localStorage so officer portal requests can send it later.
                localStorage.setItem("psacms_token", token);

                // Decode the JWT role claim to route users to the correct portal.
                const decodePayload = parseJwt(token);
                const userRole = decodePayload.role || decodePayload.authorities?.[0];

                if (userRole === 'OFFICER') {
                    window.location.href = "officer.html";  // Officers go to the officer portal.
                } else if (userRole === 'CITIZEN') {
                    window.location.href = "citizen.html";  // Citizens go to the citizen portal.
                } else {
                    localStorage.removeItem("psacms_token");
                    errorAlert.textContent = 'Login succeeded, but the user role in the token is missing or invalid.';
                    errorAlert.classList.remove("d-none");
                }
            } else {
                // Show a clear error when the backend rejects the credentials.
                if(errorAlert){
                    errorAlert.textContent = 'Account or password is incorrect.';
                    errorAlert.classList.remove('d-none');
                }else{
                    alert('Account or password is incorrect.');  // Fallback if the alert container is missing.
                }
            }
        })
        .catch(error => {
            // Network errors usually mean the Render backend is unavailable or still waking up.
            if(errorAlert){
                errorAlert.textContent = 'Server connection failed, please check if the Render is on';
                errorAlert.classList.remove('d-none');
            }else{
                alert('Server connection failed, please check if the Render is on');
            }
        });
    });

    // Decode a browser-safe JWT payload so the frontend can read non-sensitive claims.
    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }
</script>
</body>
</html>
