spring.application.name=psacms
server.port=${PORT:8080}
server.servlet.context-path=/psacms

# ===============================
# Database Configuration (MySQL)
# ===============================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/psacms}
spring.datasource.username=${DATABASE_USERNAME:cst8288}
spring.datasource.password=${DATABASE_PASSWORD:cst8288}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
